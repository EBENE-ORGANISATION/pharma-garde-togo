<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#2f7355" />
    <title>PharmaGarde — Hors ligne</title>
    <style>
      body {
        margin: 0;
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        color: #1f2a24;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        text-align: center;
        padding: 24px;
        box-sizing: border-box;
      }
      .card {
        max-width: 360px;
      }
      h1 {
        color: #2f7355;
        font-size: 1.25rem;
        margin: 0 0 8px;
      }
      p {
        margin: 0;
        font-size: 0.9rem;
        color: #5b6b63;
      }
      button {
        margin-top: 20px;
        border: none;
        border-radius: 12px;
        background: #2f7355;
        color: #ffffff;
        font-weight: 700;
        font-size: 0.9rem;
        padding: 12px 20px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Vous êtes hors ligne</h1>
      <p>
        PharmaGarde n'a pas pu charger cette page. Reconnectez-vous pour mettre à jour les
        pharmacies de garde, ou réessayez — les données déjà visitées restent disponibles.
      </p>
      <button onclick="location.reload()">Réessayer</button>
    </div>
  </body>
</html>
